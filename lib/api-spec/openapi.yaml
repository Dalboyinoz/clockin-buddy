openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: locationEvents
    description: Location event operations
  - name: workLocation
    description: Work location operations
  - name: summary
    description: Summary and analytics

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /location-events:
    get:
      operationId: listLocationEvents
      tags: [locationEvents]
      summary: List location events, optionally filtered by date (YYYY-MM-DD)
      parameters:
        - name: date
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 200
      responses:
        "200":
          description: List of location events
          content:
            application/json:
              schema:
                type: object
                properties:
                  events:
                    type: array
                    items:
                      $ref: "#/components/schemas/LocationEvent"
                required: [events]
    post:
      operationId: createLocationEvent
      tags: [locationEvents]
      summary: Record an arrival or departure event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLocationEventBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LocationEvent"

  /location-events/{id}:
    delete:
      operationId: deleteLocationEvent
      tags: [locationEvents]
      summary: Delete a location event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /location-events/today:
    get:
      operationId: getTodayEvents
      tags: [locationEvents]
      summary: Get today's events and computed daily total
      responses:
        "200":
          description: Today's summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TodayEventsResponse"

  /summary/week:
    get:
      operationId: getWeeklySummary
      tags: [summary]
      summary: Get current week summary (first arrival to last departure per day)
      responses:
        "200":
          description: Weekly summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklySummary"

  /summary/totals:
    get:
      operationId: getTotals
      tags: [summary]
      summary: Get all-time totals
      responses:
        "200":
          description: Totals
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Totals"

  /summary/history:
    get:
      operationId: getHistorySummary
      tags: [summary]
      summary: Get per-day history with first arrival, last departure, total minutes
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 30
      responses:
        "200":
          description: History per day
          content:
            application/json:
              schema:
                type: object
                properties:
                  days:
                    type: array
                    items:
                      $ref: "#/components/schemas/DaySummary"
                required: [days]

  /work-location:
    get:
      operationId: getWorkLocation
      tags: [workLocation]
      summary: Get the saved work location
      responses:
        "200":
          description: Work location
          content:
            application/json:
              schema:
                type: object
                properties:
                  location:
                    oneOf:
                      - $ref: "#/components/schemas/WorkLocation"
                      - type: "null"
                required: [location]
    put:
      operationId: setWorkLocation
      tags: [workLocation]
      summary: Save the work location
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetWorkLocationBody"
      responses:
        "200":
          description: Updated work location
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkLocation"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    LocationEvent:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [arrival, departure]
        timestamp:
          type: string
          format: date-time
        latitude:
          type: number
          nullable: true
        longitude:
          type: number
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, type, timestamp, latitude, longitude, createdAt]

    CreateLocationEventBody:
      type: object
      properties:
        type:
          type: string
          enum: [arrival, departure]
        timestamp:
          type: string
          format: date-time
        latitude:
          type: number
        longitude:
          type: number
      required: [type, timestamp]

    TodayEventsResponse:
      type: object
      properties:
        events:
          type: array
          items:
            $ref: "#/components/schemas/LocationEvent"
        firstArrival:
          type: string
          format: date-time
          nullable: true
        lastDeparture:
          type: string
          format: date-time
          nullable: true
        totalMinutes:
          type: number
          nullable: true
        currentlyAtWork:
          type: boolean
      required: [events, firstArrival, lastDeparture, totalMinutes, currentlyAtWork]

    DaySummary:
      type: object
      properties:
        date:
          type: string
        firstArrival:
          type: string
          format: date-time
          nullable: true
        lastDeparture:
          type: string
          format: date-time
          nullable: true
        totalMinutes:
          type: number
          nullable: true
        events:
          type: array
          items:
            $ref: "#/components/schemas/LocationEvent"
      required: [date, firstArrival, lastDeparture, totalMinutes, events]

    WeeklySummary:
      type: object
      properties:
        weekStart:
          type: string
          format: date-time
        weekEnd:
          type: string
          format: date-time
        totalMinutes:
          type: number
        totalHours:
          type: number
        daysWorked:
          type: integer
        dailyBreakdown:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
              totalMinutes:
                type: number
              entries:
                type: integer
            required: [date, totalMinutes, entries]
      required: [weekStart, weekEnd, totalMinutes, totalHours, daysWorked, dailyBreakdown]

    Totals:
      type: object
      properties:
        totalMinutes:
          type: number
        totalHours:
          type: number
        totalDays:
          type: integer
        totalEntries:
          type: integer
        averageHoursPerDay:
          type: number
      required: [totalMinutes, totalHours, totalDays, totalEntries, averageHoursPerDay]

    WorkLocation:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        radiusMeters:
          type: number
        createdAt:
          type: string
          format: date-time
      required: [id, name, latitude, longitude, radiusMeters, createdAt]

    SetWorkLocationBody:
      type: object
      properties:
        name:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        radiusMeters:
          type: number
      required: [name, latitude, longitude, radiusMeters]
