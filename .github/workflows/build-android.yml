name: Build Android AAB

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      api_base_url:
        description: "Deployed API base URL (e.g. https://your-app.replit.app)"
        required: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app
        working-directory: artifacts/timesheet-tracker
        env:
          PORT: "3000"
          BASE_PATH: "/"
          VITE_API_BASE_URL: ${{ secrets.API_BASE_URL || github.event.inputs.api_base_url }}
        run: pnpm run build

      - name: Sync Capacitor
        working-directory: artifacts/timesheet-tracker
        run: npx cap sync android

      - name: Decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > $HOME/release.keystore

      - name: Build release AAB
        working-directory: artifacts/timesheet-tracker/android
        run: |
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$HOME/release.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.ANDROID_STORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.ANDROID_KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: clockin-release-${{ github.run_number }}
          path: artifacts/timesheet-tracker/android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
